  <path d="M88 110 Q118 102 148 110"/>

  <!-- T恤 -->
  <path d="M88 110 L82 260"/>
  <path d="M148 110 L154 260"/>

  <!-- 举起的右手（连接到前面的 SOS） -->
  <path d="M148 120 Q140 100 135 85"/>

