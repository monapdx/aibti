  <!-- 汗滴 -->
  <path d="M98 60 Q96 64 99 66 Q101 64 99 60" opacity="0.7"/>
  <path d="M142 65 Q140 69 143 71 Q145 69 143 65" opacity="0.7"/>

  <!-- 脖 -->
