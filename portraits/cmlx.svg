  <!-- 地上散落的"报错" -->
  <text x="60" y="290" font-size="9" stroke="none" fill="#00ff88" opacity="0.6">ERROR</text>
  <text x="170" y="285" font-size="9" stroke="none" fill="#00ff88" opacity="0.5">NPE</text>

  <text x="120" y="315" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" fill="#00ff88" stroke="none" letter-spacing="2">CMLX · 卡点求助侠</text>
</svg>
