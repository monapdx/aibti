<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 320" fill="none" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="120" cy="155" r="135" stroke-dasharray="2 8" opacity="0.15"/>
  <circle cx="120" cy="155" r="108" stroke-dasharray="1 6" opacity="0.25"/>

  <!-- 举起手 + SOS -->
