  <circle cx="112" cy="64" r="2"/>
  <circle cx="124" cy="64" r="2"/>
  <circle cx="112" cy="65" r="0.8" fill="#00ff88"/>
  <circle cx="124" cy="65" r="0.8" fill="#00ff88"/>

  <!-- 嘴（哀嚎） -->
